name: BTY Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Project
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        working-directory: bty-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: verify

    if: github.event_name == 'pull_request'

    steps:
      - name: Auto merge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: squash
