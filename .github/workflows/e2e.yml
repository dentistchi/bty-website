# BTY E2E — 기본/comeback auth 분리 생성 후 chromium 스위트 (수동 실행 우선)
name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bty-app/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "bty-app/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: bty-app

    env:
      # Opt into Node 24 for JS actions (checkout/setup-node/upload-artifact) before default June 2026
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CI: true
      PLAYWRIGHT_NO_WEB_SERVER: "1"
      BASE_URL: ${{ secrets.BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_COMEBACK_EMAIL: ${{ secrets.E2E_COMEBACK_EMAIL }}
      E2E_COMEBACK_PASSWORD: ${{ secrets.E2E_COMEBACK_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bty-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set BASE_URL (local dev server by default)
        run: |
          BASE_URL_CLEAN=$(echo "$BASE_URL" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$BASE_URL_CLEAN" ]; then
            BASE_URL_CLEAN="http://127.0.0.1:3000"
            echo "Using default BASE_URL: $BASE_URL_CLEAN (local E2E)"
          else
            echo "Using BASE_URL: $BASE_URL_CLEAN"
          fi
          echo "BASE_URL=$BASE_URL_CLEAN" >> "$GITHUB_ENV"

      - name: Check required E2E secrets
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            echo "Missing secret: E2E_EMAIL"
            exit 1
          fi
          if [ -z "$E2E_PASSWORD" ]; then
            echo "Missing secret: E2E_PASSWORD"
            exit 1
          fi
          if [ -z "$E2E_COMEBACK_EMAIL" ]; then
            echo "Missing secret: E2E_COMEBACK_EMAIL"
            exit 1
          fi
          if [ -z "$E2E_COMEBACK_PASSWORD" ]; then
            echo "Missing secret: E2E_COMEBACK_PASSWORD"
            exit 1
          fi

      - name: Run E2E suite
        run: |
          if [[ "$BASE_URL" == *"127.0.0.1"* ]] || [[ "$BASE_URL" == *"localhost"* ]]; then
            npm run dev &
            npx wait-on --timeout 120000 "$BASE_URL" || (echo "Dev server failed to start" && exit 1)
          fi
          npm run e2e:seed-default-journey
          npm run e2e:seed-comeback
          npm run e2e:auth
          npm run e2e:auth:comeback
          npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            bty-app/playwright-report
            bty-app/test-results
          if-no-files-found: ignore
