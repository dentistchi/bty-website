# BTY E2E — 기본/comeback auth 분리 생성 후 chromium 스위트 (수동 실행 우선)
name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bty-app/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "bty-app/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: bty-app

    env:
      CI: true
      PLAYWRIGHT_NO_WEB_SERVER: "1"
      BASE_URL: ${{ secrets.BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_COMEBACK_EMAIL: ${{ secrets.E2E_COMEBACK_EMAIL }}
      E2E_COMEBACK_PASSWORD: ${{ secrets.E2E_COMEBACK_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bty-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set BASE_URL (local dev server by default)
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
            echo "Using default BASE_URL: http://127.0.0.1:3000 (local E2E)"
          else
            echo "Using BASE_URL: $BASE_URL"
          fi

      - name: Check required E2E secrets
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            echo "Missing secret: E2E_EMAIL"
            exit 1
          fi
          if [ -z "$E2E_PASSWORD" ]; then
            echo "Missing secret: E2E_PASSWORD"
            exit 1
          fi
          if [ -z "$E2E_COMEBACK_EMAIL" ]; then
            echo "Missing secret: E2E_COMEBACK_EMAIL"
            exit 1
          fi
          if [ -z "$E2E_COMEBACK_PASSWORD" ]; then
            echo "Missing secret: E2E_COMEBACK_PASSWORD"
            exit 1
          fi

      - name: Run E2E suite
        run: |
          if [[ "$BASE_URL" == *"127.0.0.1"* ]] || [[ "$BASE_URL" == *"localhost"* ]]; then
            npm run dev &
            npx wait-on --timeout 120000 "$BASE_URL" || (echo "Dev server failed to start" && exit 1)
          fi
          npm run e2e:auth
          npm run e2e:auth:comeback
          npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            bty-app/playwright-report
            bty-app/test-results
          if-no-files-found: ignore
