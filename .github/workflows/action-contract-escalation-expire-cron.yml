# Expire open action-contract escalations past `expires_at` (72h SLA) — hourly
# See bty-app/docs/ACTION_CONTRACT_ESCALATION_EXPIRE_CRON.md

name: Action contract escalation expire

on:
  schedule:
    # Every hour UTC (SLA is 72h; frequent runs keep expiry tight)
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  escalation-expire:
    name: POST /api/cron/action-contract-escalation-expire
    runs-on: ubuntu-latest
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Call escalation expiry endpoint
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing DEPLOY_URL or CRON_SECRET. Set in repo Secrets (see docs/CI_SECRETS_CRON_E2E.md)."
            exit 1
          fi
          BASE=$(printf '%s' "$DEPLOY_URL" | tr -d '\r\n' | sed 's/[[:space:]]*$//;s#/*$##')
          URL="${BASE}/api/cron/action-contract-escalation-expire"
          echo "POST $URL (Authorization: Bearer <CRON_SECRET>)"
          res=$(curl -sS -w "\n%{http_code}" -X POST "$URL" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          code=$(echo "$res" | tail -n1)
          body=$(echo "$res" | sed '$d')
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "HTTP $code"
            exit 1
          fi
          echo "OK"
