name = "bty-arena-staging"
main = ".open-next/worker.js"
compatibility_date = "2026-04-26"

compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Worker vars: Wrangler deploys from this file; omitting keys here overwrites Dashboard-only values.
# See ENGINE_ARCHITECTURE_V1.md §6 — Pipeline N entry (`/{locale}/bty-arena`).
[vars]
NEXT_PUBLIC_ARENA_PIPELINE_DEFAULT = "new"
ARENA_PIPELINE_DEFAULT = "new"
BTY_ARENA_VERTICAL_SLICE_ENTRY_SCENARIO_ID = "core_01_training_system_exposure"
BTY_ENV = "staging"
BTY_WORKER_NAME = "bty-arena-staging"
BTY_DEPLOY_VERSION = "2026-04-27-api-version-endpoint-v1"
BTY_BUILD_TIME = "2026-04-27T18:21:00Z"
BTY_APP_VERSION = "0.1.0"
BTY_ADMIN_EMAILS = "ywamer2022@gmail.com"